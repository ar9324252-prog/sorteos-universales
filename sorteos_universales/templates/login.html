{% extends 'base.html' %}
{% block title %}Iniciar Sesión — Sorteos Universales{% endblock %}
{% block content %}
<div style="max-width:420px;margin:4rem auto;">
  <div class="text-center mb-8">
    <div class="logo-orbit" style="margin:0 auto .75rem;"><div class="ring"></div><div class="planet"></div></div>
    <h1 style="font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.3rem;background:linear-gradient(90deg,#a78bfa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Iniciar Sesión</h1>
    <p style="color:var(--mist);font-size:.88rem;margin-top:.5rem;">Entra al universo de los sorteos</p>
  </div>
  <div class="card p-6">
    <form method="POST" style="display:flex;flex-direction:column;gap:1rem;">
      <div class="form-group">
        <label class="form-label">Correo Electrónico</label>
        <input class="form-control" type="email" name="email" placeholder="correo@ejemplo.com" required autofocus/>
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input class="form-control" type="password" name="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:.5rem;">Entrar al Universo →</button>
    </form>
    <div class="divider" style="margin:1.25rem 0;"></div>
    <p style="text-align:center;font-size:.85rem;color:var(--mist);">¿No tienes cuenta? <a href="{{ url_for('registro') }}" style="color:var(--cyan);font-weight:600;">Regístrate gratis</a></p>
    <p style="text-align:center;font-size:.75rem;color:rgba(148,163,184,.5);margin-top:1rem;">Acceso privado para administración.</p>
  </div>
</div>
{% endblock %}
